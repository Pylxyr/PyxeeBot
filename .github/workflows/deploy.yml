name: Deploy Music Bot

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends --fix-missing libsodium-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio ruff pip-audit mypy

      - name: Lint
        run: ruff check musicbot/ tests/

      - name: Format check
        run: ruff format --check musicbot/ tests/

      - name: Type check
        run: mypy musicbot/
        
      - name: Security audit
        run: pip-audit --ignore-vuln CVE-2025-69277  
        
      - name: Tests
        run: pytest tests/ -q --tb=short

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd ~/musicbot

            git fetch origin main

            # Clean Git index only - NEVER delete live data/
            git rm -r --cached data/ 2>/dev/null || true

            git reset --hard origin/main

            ~/musicbot/.venv/bin/pip install -r requirements.txt -q

            sudo systemctl stop musicbot
            sudo systemctl daemon-reload
            sudo systemctl start musicbot

            for i in 1 2 3 4 5; do
              sleep 3
              systemctl is-active --quiet musicbot && break
              if [ $i -eq 5 ]; then
                journalctl -u musicbot -n 30 --no-pager
                exit 1
              fi
            done

            echo "Deployed: $(git rev-parse --short HEAD)"
