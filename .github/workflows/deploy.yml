name: Deploy Music Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/musicbot
            
            # Fetch latest changes from GitHub
            git fetch origin main
            
            # Force reset local files to match remote repository exactly
            git reset --hard origin/main
            
            # Restart your systemd service using sudo (configured for no password)
            # Change 'musicbot' if your actual service file has a different name
            sudo systemctl restart musicbot
