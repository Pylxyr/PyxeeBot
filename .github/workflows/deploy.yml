name: Deploy Music Bot

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends --fix-missing libsodium-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio ruff pip-audit

      - name: Lint
        run: ruff check musicbot/ tests/

      - name: Security audit
        run: pip-audit
        continue-on-error: true

      - name: Tests
        run: pytest tests/ -q --tb=short

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd ~/musicbot
            git fetch origin main
            git reset --hard origin/main
            pip install -r requirements.txt --break-system-packages -q
            sudo systemctl stop musicbot
            sudo systemctl daemon-reload
            sudo systemctl start musicbot
            sleep 3
            systemctl is-active --quiet musicbot || { journalctl -u musicbot -n 20 --no-pager; exit 1; }
