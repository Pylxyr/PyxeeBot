[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 110

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",   # line too long — handled by formatter
    "E402",   # module level import not at top (TYPE_CHECKING pattern)
    "F401",   # unused import — false positives in TYPE_CHECKING blocks
]
